<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Se connecter à votre compte Microsoft</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="logo.svg" alt="Microsoft" class="main-logo">
            
            <h2>Se connecter</h2>
            <input type="email" placeholder="E-mail, téléphone ou Skype">
            
            <p class="no-account">Pas de compte ? <a href="#">Créez-en un !</a></p>
            <p class="access-lost"><a href="#">Plus d'accès à votre compte ?</a></p>
            
            <div class="button-group">
                <div class="signin-options">
                    <img src="options.svg" alt="Options">
                    <span>Options de connexion</span>
                </div>
                <button type="button">Suivant</button>
            </div>
        </div>
    </div>
</body>
</html>
